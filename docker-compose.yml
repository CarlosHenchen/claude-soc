# ============================================================================
# Viaconnect SOC Maturity — app de arquivo único (preview.html) via Nginx.
#
#   docker compose up -d --build
#   # abra http://SEU_SERVIDOR:8080   (login: admin / admin)
#
# Sem banco, sem backend, sem .env. Os dados ficam no navegador (localStorage).
# A aba "Recomendações" pode chamar a API do Claude direto do navegador —
# configure a chave em Configurações. Sirva por HTTPS em produção (ver README).
# ============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-soc:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
