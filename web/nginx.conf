server {
    listen 80;
    server_name _;

    # O estado da app (documento JSON) pode crescer — permita PUTs grandes.
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # API -> backend FastAPI (mesmo network do compose).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # SPA: serve os arquivos estáticos; cai no index.html quando a rota não casa.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
